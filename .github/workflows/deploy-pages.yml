name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Fetch release assets into site bundle
        shell: bash
        env:
          OWNER: DecarbNexus
          REPO: useeio_sectors_disaggregation
          TAG: v1.2
        run: |
          set -euo pipefail
          mkdir -p docs/data
          echo "Downloading release assets ${TAG} into docs/data ..."
          curl -L --fail -o "docs/data/SEF_v1.3.0__disaggregation_factors__GHG2022_IO2017_light.csv"  "https://github.com/${OWNER}/${REPO}/releases/download/${TAG}/SEF_v1.3.0__disaggregation_factors__GHG2022_IO2017_light.csv"
          curl -L --fail -o "docs/data/SEF_v1.3.0_sector_classification.csv"                          "https://github.com/${OWNER}/${REPO}/releases/download/${TAG}/SEF_v1.3.0_sector_classification.csv"
          curl -L --fail -o "docs/data/SEF_v1.4.0__disaggregation_factors__GHG2023_IO2017_light.csv"  "https://github.com/${OWNER}/${REPO}/releases/download/${TAG}/SEF_v1.4.0__disaggregation_factors__GHG2023_IO2017_light.csv"
          curl -L --fail -o "docs/data/SEF_v1.4.0_sector_classification.csv"                          "https://github.com/${OWNER}/${REPO}/releases/download/${TAG}/SEF_v1.4.0_sector_classification.csv"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
